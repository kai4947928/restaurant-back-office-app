{% extends "base.html" %}

{% block title %}パスワード再設定{% endblock %}

{% block content %}
<h1>パスワード変更</h1>

<form method="post">
    {{ form.hidden_tag() }}
    <div>
        {{ form.new_password.label }}
        {{ form.new_password() }}
    </div>

    <div>
        {{ form.confirm_password.label }}
        {{ form.confirm_password() }}
    </div>

    {{ form.submit() }}
</form>
{% endblock %}
